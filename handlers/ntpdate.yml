---
# Generated by .configure.yml
# Handlers for ntpdate
- name: Start ntpdate
  listen: start ntpdate
  ansible.builtin.service:
    name: ntpdate
    state: started

- name: Stop ntpdate
  listen: stop ntpdate
  ansible.builtin.service:
    name: ntpdate
    state: stopped

- name: Restart ntpdate
  listen: restart ntpdate
  when: fp_ntpdate_enable | bool
  ansible.builtin.service:
    name: ntpdate
    state: restarted

- name: Reload ntpdate
  listen: reload ntpdate
  when: fp_ntpdate_enable | bool
  ansible.builtin.service:
    name: ntpdate
    state: reloaded

# EOF
