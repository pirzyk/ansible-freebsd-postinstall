---
# Generated by .configure.yml
# Handlers for apcupsd
- name: Start apcupsd
  listen: start apcupsd
  ansible.builtin.service:
    name: apcupsd
    state: started

- name: Stop apcupsd
  listen: stop apcupsd
  ansible.builtin.service:
    name: apcupsd
    state: stopped

- name: Restart apcupsd
  listen: restart apcupsd
  when: fp_apcupsd_enable | bool
  ansible.builtin.service:
    name: apcupsd
    state: restarted

- name: Reload apcupsd
  listen: reload apcupsd
  when: fp_apcupsd_enable | bool
  ansible.builtin.service:
    name: apcupsd
    state: reloaded

# EOF
