---
# Generated by .configure.yml
# Handlers for syslogd
- name: Start syslogd
  listen: start syslogd
  ansible.builtin.service:
    name: syslogd
    state: started

- name: Stop syslogd
  listen: stop syslogd
  ansible.builtin.service:
    name: syslogd
    state: stopped

- name: Restart syslogd
  listen: restart syslogd
  when: fp_syslogd_enable | bool
  ansible.builtin.service:
    name: syslogd
    state: restarted

- name: Reload syslogd
  listen: reload syslogd
  when: fp_syslogd_enable | bool
  ansible.builtin.service:
    name: syslogd
    state: reloaded

# EOF
