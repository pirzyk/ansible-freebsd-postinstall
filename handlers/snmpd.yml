---
# Generated by .configure.yml
# Handlers for snmpd
- name: Start snmpd
  listen: start snmpd
  ansible.builtin.service:
    name: snmpd
    state: started

- name: Stop snmpd
  listen: stop snmpd
  ansible.builtin.service:
    name: snmpd
    state: stopped

- name: Restart snmpd
  listen: restart snmpd
  when: fp_snmpd_enable | bool
  ansible.builtin.service:
    name: snmpd
    state: restarted

- name: Reload snmpd
  listen: reload snmpd
  when: fp_snmpd_enable | bool
  ansible.builtin.service:
    name: snmpd
    state: reloaded

# EOF
