---
# Generated by .configure.yml
# Handlers for statd
- name: Start statd
  listen: start statd
  ansible.builtin.service:
    name: statd
    state: started

- name: Stop statd
  listen: stop statd
  ansible.builtin.service:
    name: statd
    state: stopped

- name: Restart statd
  listen: restart statd
  when: fp_statd_enable | bool
  ansible.builtin.service:
    name: statd
    state: restarted

- name: Reload statd
  listen: reload statd
  when: fp_statd_enable | bool
  ansible.builtin.service:
    name: statd
    state: reloaded

# EOF
