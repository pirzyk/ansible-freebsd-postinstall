---
# Generated by .configure.yml
# Handlers for inetd
- name: Start inetd
  listen: start inetd
  ansible.builtin.service:
    name: inetd
    state: started

- name: Stop inetd
  listen: stop inetd
  ansible.builtin.service:
    name: inetd
    state: stopped

- name: Restart inetd
  listen: restart inetd
  when: fp_inetd_enable | bool
  ansible.builtin.service:
    name: inetd
    state: restarted

- name: Reload inetd
  listen: reload inetd
  when: fp_inetd_enable | bool
  ansible.builtin.service:
    name: inetd
    state: reloaded

# EOF
