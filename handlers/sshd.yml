---
# Generated by .configure.yml
# Handlers for sshd
- name: Start sshd
  listen: start sshd
  ansible.builtin.service:
    name: sshd
    state: started

- name: Stop sshd
  listen: stop sshd
  ansible.builtin.service:
    name: sshd
    state: stopped

- name: Restart sshd
  listen: restart sshd
  when: fp_sshd_enable | bool
  ansible.builtin.service:
    name: sshd
    state: restarted

- name: Reload sshd
  listen: reload sshd
  when: fp_sshd_enable | bool
  ansible.builtin.service:
    name: sshd
    state: reloaded

# EOF
