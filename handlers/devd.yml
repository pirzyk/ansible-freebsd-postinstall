---
# Generated by .configure.yml
# Handlers for devd
- name: Start devd
  listen: start devd
  ansible.builtin.service:
    name: devd
    state: started

- name: Stop devd
  listen: stop devd
  ansible.builtin.service:
    name: devd
    state: stopped

- name: Restart devd
  listen: restart devd
  when: fp_devd_enable | bool
  ansible.builtin.service:
    name: devd
    state: restarted

- name: Reload devd
  listen: reload devd
  when: fp_devd_enable | bool
  ansible.builtin.service:
    name: devd
    state: reloaded

# EOF
