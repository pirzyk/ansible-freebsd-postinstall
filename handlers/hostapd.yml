---
# Generated by .configure.yml
# Handlers for hostapd
- name: Start hostapd
  listen: start hostapd
  ansible.builtin.service:
    name: hostapd
    state: started

- name: Stop hostapd
  listen: stop hostapd
  ansible.builtin.service:
    name: hostapd
    state: stopped

- name: Restart hostapd
  listen: restart hostapd
  when: fp_hostapd_enable | bool
  ansible.builtin.service:
    name: hostapd
    state: restarted

- name: Reload hostapd
  listen: reload hostapd
  when: fp_hostapd_enable | bool
  ansible.builtin.service:
    name: hostapd
    state: reloaded

# EOF
