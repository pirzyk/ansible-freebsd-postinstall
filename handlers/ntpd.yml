---
# Generated by .configure.yml
# Handlers for ntpd
- name: Start ntpd
  listen: start ntpd
  ansible.builtin.service:
    name: ntpd
    state: started

- name: Stop ntpd
  listen: stop ntpd
  ansible.builtin.service:
    name: ntpd
    state: stopped

- name: Restart ntpd
  listen: restart ntpd
  when: fp_ntpd_enable | bool
  ansible.builtin.service:
    name: ntpd
    state: restarted

- name: Reload ntpd
  listen: reload ntpd
  when: fp_ntpd_enable | bool
  ansible.builtin.service:
    name: ntpd
    state: reloaded

# EOF
