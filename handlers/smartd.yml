---
# Generated by .configure.yml
# Handlers for smartd
- name: Start smartd
  listen: start smartd
  ansible.builtin.service:
    name: smartd
    state: started

- name: Stop smartd
  listen: stop smartd
  ansible.builtin.service:
    name: smartd
    state: stopped

- name: Restart smartd
  listen: restart smartd
  when: fp_smartd_enable | bool
  ansible.builtin.service:
    name: smartd
    state: restarted

- name: Reload smartd
  listen: reload smartd
  when: fp_smartd_enable | bool
  ansible.builtin.service:
    name: smartd
    state: reloaded

# EOF
