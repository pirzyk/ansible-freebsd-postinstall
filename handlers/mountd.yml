---
# Generated by .configure.yml
# Handlers for mountd
- name: Start mountd
  listen: start mountd
  ansible.builtin.service:
    name: mountd
    state: started

- name: Stop mountd
  listen: stop mountd
  ansible.builtin.service:
    name: mountd
    state: stopped

- name: Restart mountd
  listen: restart mountd
  when: fp_mountd_enable | bool
  ansible.builtin.service:
    name: mountd
    state: restarted

- name: Reload mountd
  listen: reload mountd
  when: fp_mountd_enable | bool
  ansible.builtin.service:
    name: mountd
    state: reloaded

# EOF
