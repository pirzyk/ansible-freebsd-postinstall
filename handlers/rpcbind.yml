---
# Generated by .configure.yml
# Handlers for rpcbind
- name: Start rpcbind
  listen: start rpcbind
  ansible.builtin.service:
    name: rpcbind
    state: started

- name: Stop rpcbind
  listen: stop rpcbind
  ansible.builtin.service:
    name: rpcbind
    state: stopped

- name: Restart rpcbind
  listen: restart rpcbind
  when: fp_rpcbind_enable | bool
  ansible.builtin.service:
    name: rpcbind
    state: restarted

- name: Reload rpcbind
  listen: reload rpcbind
  when: fp_rpcbind_enable | bool
  ansible.builtin.service:
    name: rpcbind
    state: reloaded

# EOF
