---
# Generated by .configure.yml
# Handlers for devfs
- name: Start devfs
  listen: start devfs
  ansible.builtin.service:
    name: devfs
    state: started

- name: Stop devfs
  listen: stop devfs
  ansible.builtin.service:
    name: devfs
    state: stopped

- name: Restart devfs
  listen: restart devfs
  when: fp_devfs_enable | bool
  ansible.builtin.service:
    name: devfs
    state: restarted

- name: Reload devfs
  listen: reload devfs
  when: fp_devfs_enable | bool
  ansible.builtin.service:
    name: devfs
    state: reloaded

# EOF
