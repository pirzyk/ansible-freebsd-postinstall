---
# Generated by .configure.yml
# Handlers for qemu
- name: Start qemu
  listen: start qemu
  ansible.builtin.service:
    name: qemu
    state: started

- name: Stop qemu
  listen: stop qemu
  ansible.builtin.service:
    name: qemu
    state: stopped

- name: Restart qemu
  listen: restart qemu
  when: fp_qemu_enable | bool
  ansible.builtin.service:
    name: qemu
    state: restarted

- name: Reload qemu
  listen: reload qemu
  when: fp_qemu_enable | bool
  ansible.builtin.service:
    name: qemu
    state: reloaded

# EOF
