---
# Generated by .configure.yml
# Handlers for nfsd
- name: Start nfsd
  listen: start nfsd
  ansible.builtin.service:
    name: nfsd
    state: started

- name: Stop nfsd
  listen: stop nfsd
  ansible.builtin.service:
    name: nfsd
    state: stopped

- name: Restart nfsd
  listen: restart nfsd
  when: fp_nfsd_enable | bool
  ansible.builtin.service:
    name: nfsd
    state: restarted

- name: Reload nfsd
  listen: reload nfsd
  when: fp_nfsd_enable | bool
  ansible.builtin.service:
    name: nfsd
    state: reloaded

# EOF
