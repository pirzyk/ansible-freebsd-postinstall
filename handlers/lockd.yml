---
# Generated by .configure.yml
# Handlers for lockd
- name: Start lockd
  listen: start lockd
  ansible.builtin.service:
    name: lockd
    state: started

- name: Stop lockd
  listen: stop lockd
  ansible.builtin.service:
    name: lockd
    state: stopped

- name: Restart lockd
  listen: restart lockd
  when: fp_lockd_enable | bool
  ansible.builtin.service:
    name: lockd
    state: restarted

- name: Reload lockd
  listen: reload lockd
  when: fp_lockd_enable | bool
  ansible.builtin.service:
    name: lockd
    state: reloaded

# EOF
